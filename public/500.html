<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>You-Bet — Something broke (500)</title>
  <style>
    :root {
      --bg: #FBF6EC; --surface: #EDE9E2; --border: #DFC3DA;
      --text: #3B3239; --muted: #6E6358;
      --coral: #EC6258; --coral-ink: #AA473F; --cyan-ink: #377066;
      --purple-ink: #8152AE; --yellow: #F4BB5C;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: "Libre Franklin", system-ui, sans-serif; padding: 1.5rem;
    }
    .card {
      position: relative; width: 100%; max-width: 520px; padding: 2.5rem 2rem;
      background: var(--surface); border: 3px solid var(--border);
      box-shadow: 6px 6px 0 rgba(0,0,0,0.25); text-align: center;
    }
    .logo { display: block; width: 100%; max-width: 240px; height: auto; margin: 0 auto 1.25rem; }
    .cat { margin: 0 auto 1.25rem; color: var(--coral-ink); font-size: 0.9rem; line-height: 1.15; }
    .code { margin: 0; font-size: 3.5rem; font-weight: 800; line-height: 1; color: var(--text);
      text-shadow: 3px 3px 0 var(--coral); }
    .msg { margin: 0.5rem 0 0; font-size: 1.05rem; color: var(--muted); }
    .brand { display: inline-block; margin-top: 1.5rem; padding: 0.35rem 1rem;
      background: var(--yellow); border: 2px solid #000; box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
      color: var(--text); font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.08em; text-decoration: none; }
    .spark { position: absolute; font-size: 1.15rem; }
    .spark.a { top: 0.9rem; left: 1.1rem; color: var(--cyan-ink); }
    .spark.b { bottom: 0.9rem; right: 1.2rem; color: var(--purple-ink); }
  </style>
</head>
<body>
  <div class="card">
    <span class="spark a">✦</span>
    <span class="spark b">✧</span>
    <img class="logo" src="/you-bet-logo.svg" alt="You-Bet">
    <pre class="cat" aria-hidden="true">
   /\_____/\
  /  x   x  \
 ( ==  _  == )
  )         (
 ( uh-oh... )
  )         (
 (__(__)_(__)_)
    </pre>
    <h1 class="code">500</h1>
    <p class="msg">Something broke on our end. We're on it.</p>
    <a class="brand" href="/">Back home</a>
  </div>
</body>
</html>
