<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>You-Bet — Something broke (500)</title>
  <style>
    :root {
      --bg: #1F1714; --surface: #2A2119; --border: #3D2E24;
      --text: #F5E6D3; --muted: #A89585;
      --coral: #FF6B6B; --cyan: #4ECDC4; --yellow: #FFE66D; --purple: #C792EA;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: "Libre Franklin", system-ui, sans-serif; padding: 1.5rem;
    }
    .card {
      position: relative; width: 100%; max-width: 520px; padding: 2.5rem 2rem;
      background: var(--surface); border: 3px solid var(--border);
      box-shadow: 6px 6px 0 rgba(0,0,0,0.3); text-align: center;
    }
    .cat { margin: 0 auto 1.25rem; color: var(--coral); font-size: 0.9rem; line-height: 1.15;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.35); }
    .code { margin: 0; font-size: 3.5rem; font-weight: 800; line-height: 1; color: var(--text);
      text-shadow: 3px 3px 0 var(--coral); }
    .msg { margin: 0.5rem 0 0; font-size: 1.05rem; color: var(--muted); }
    .brand { display: inline-block; margin-top: 1.5rem; padding: 0.35rem 1rem;
      background: var(--yellow); border: 2px solid #000; box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      color: #1F1714; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.08em; text-decoration: none; }
    .spark { position: absolute; font-size: 1.15rem; opacity: 0.9; }
    .spark.a { top: 0.9rem; left: 1.1rem; color: var(--cyan); }
    .spark.b { bottom: 0.9rem; right: 1.2rem; color: var(--purple); }
  </style>
</head>
<body>
  <div class="card">
    <span class="spark a">✦</span>
    <span class="spark b">✧</span>
    <pre class="cat" aria-hidden="true">
   /\_____/\
  /  x   x  \
 ( ==  _  == )
  )         (
 ( uh-oh... )
  )         (
 (__(__)_(__)_)
    </pre>
    <h1 class="code">500</h1>
    <p class="msg">Something broke on our end. We're on it.</p>
    <a class="brand" href="/">You-Bet — back home</a>
  </div>
</body>
</html>
