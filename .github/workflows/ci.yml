name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Reject unedited scaffold paths
        run: |
          if git ls-files | grep -E '(^|/)path/to/'; then
            echo "::error::Found file(s) under a literal 'path/to/' placeholder — looks like unedited scaffold/AI output, not a real change."
            exit 1
          fi

      - name: Flag boilerplate-y PR descriptions (advisory only)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          score=0
          for phrase in "changes made:" "testing instructions:" "leverage" "seamless" "robust solution" "comprehensive" "cutting-edge" "streamlin" "ensures parity" "ensures that"; do
            echo "$PR_BODY" | grep -qi "$phrase" && score=$((score + 1))
          done
          if [ "$score" -ge 3 ]; then
            echo "::warning::PR description matches $score generic AI-agent boilerplate phrases — worth a second look, not a blocker. Short, plain descriptions from first-time human contributors do NOT trigger this."
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v6
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Audit gems for known vulnerabilities
        run: bundle exec bundler-audit check --update

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bin/rails db:test:prepare && bundle exec rspec
