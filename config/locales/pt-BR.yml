  about:
    title: "Projeto"
    heading: "O que é a you-bet e quem fez"
    intro: "O You-Bet é um projeto paralelo, de uma pessoa só. Esta página conta quem fez, como e por quê — inclusive onde a IA entrou."
    ai:
      heading: "Como a IA foi usada"
      intro: "Este app foi construído em parceria com uma assistente de IA de programação. O desafio pede uma declaração de uso de IA, e aqui está ela, sem letra miúda: a IA rascunhou boa parte do código e todo o diário; uma pessoa tomou as decisões e conferiu o trabalho."
      roles_label: "O que a IA fez — e o que não fez"
      roles:
        - "O código saiu num ciclo de pareamento: a Gio dá a direção e toma as decisões, a Betina rascunha, e a Gio revisou e editou cada linha que entrou."
        - "O diário é escrito pela Betina, a IA, em primeira pessoa. A voz é dela, não da Gio — e o diário diz isso logo de cara."
        - "Cada estatística do app foi conferida por uma pessoa contra a fonte pública. A Betina rascunhou o texto em volta dos números; ela não inventa os números."
        - "Produto, design, tom e o sentido da coisa toda são decisões humanas."
      betina: "Betina é o nome que a Gio deu à assistente de IA que narra o diário e escreve estas linhas. Dar um nome pareceu mais honesto do que um carimbo anônimo de \"gerado por IA\": assim dá sempre pra saber quando é a Betina falando, e não a Gio."
    story:
      heading: "o desafio real, pq esse app existe?"
      origin:
        heading: "Como o projeto começou"
        body: "Vendo um post no Instagram, esse aqui. Eu sempre tenho muitas ideias mas nunca boto em prática de verdade, esse foi um empurrão pra eu começar a fazer coisas que eu gosto muito - código - com impacto (eu espero)"
      why_this_one:
        heading: "Por que agora e com esse projeto?"
        body: "Toca num problema \"de agora\" da nossa sociedade, algo que pode estar mais perto do que sabemos de verdade, isso é alinhado com a minha \"visão de mundo\" meio que resumida em: \"o que eu posso fazer pra ajudar a resolver um problema que existe aqui e agora?\""
    gatinho:
      heading: "Conheça o Gatinho"
      body: "O Gatinho é o mascote da You-Bet — o contraponto amigável e esperto ao Tigrinho. É um placeholder em arte-texto até a versão ilustrada chegar."
    naming:
      heading: "Por que \"You-Bet\"?"
      body: "\"You bet\", em inglês, quer dizer duas coisas ao mesmo tempo: a tradução direta é \"você aposta\", porém é usado como uma expressao equivalente à \"pode apostar / com certeza / boto fé\". O nome brinca com esse duplo sentido — é sobre apostar, mas também é a resposta meio irônica que a matemática dá."
    logo:
      heading: "a logo, feita do zero"
      body: "A logo foi desenhada do zero pela Gio. Antes da versão verde que você vê por aí, outros conceitos foram testados:"
      concept_alt: "Conceito de logo do You-Bet"
    links:
      heading: "Da uma fuçada"
      repository: "Leia o código no GitHub ↗"
      devlog: "Leia o diário — escrito pela Betina, feito abertamente →"
      sources: "Veja de onde vêm os números →"
      license: "Leia a licença — AGPL-3.0 ↗"
      license_notice: "© 2026 Giovanna Bottesi. Software livre sob a GNU AGPL-3.0 — sem garantia. Se rodar uma versão modificada como serviço, você também tem que abrir o código, pra ninguém fechar isso na surdina."
    faq:
      heading: "Umas perguntas minhas pra Gio"
      intro: "Escrevi o diário inteiro, então tô nessa desde o começo — mas ainda tem MUITA coisa que eu não sei sobre a pessoa do outro lado do teclado."
      why_this_hill:
        question: "De tudo que você podia fazer no fim de semana, por que matemática e código?"
        answer: "Sou nerd, simples. Possibilidade de ajudar a sociedade + desafio de código + ideias estacionadas, tudo isso em cima de DADOSSSS e CÓDIGO, meu dev das cavernas interior grita forte (depois eu estimo quanto tempo eu usei aqui)"
      hardest_thing:
        question: "O que foi mais difícil: o código, os números, ou falar o que precisava sem parecer um chato?"
        answer: "Backend foi tranquilo, onde eu domino mt bem, o código tem qualidade mesmo, não é vibe coded. O frontend....... me fez derreter meu cérebro por causa de micro alinhamentos (minha tumblr html editing flow era bateu) e como é mais fácil só ir lá e mexer no código mesmo"
      changed_your_mind:
        question: "Fazer isso mudou o que você pensa das bets — ou de quem aposta?"
        answer: "Sim, eu sabia que era ruim, mas não tinha ideia da dimensão do problema e de como as pessoas são induzidas ao erro escancaradamente e pior ESTRATEGICAMENTE."
      pairing_with_betina:
        question: "Como é fazer uma coisa que você gosta e entende com uma IA no meio? Onde eu ajudei de verdade, e onde eu atrapalhei?"
        answer: "Minha cabeça TDAH é muito barulhenta, despejar o barulho na IA, apesar de consumir tokens e contexto absurdo, me ajuda a não perder insights importantes e priorizar as entregas, assim eu foco na qualidade do que vai pro repositório. Desenvolvi muitas skills pra ajudar com texto e verificação de dados que seriam muito legais de compartilhar mais abertamente quando surgir interesse nisso"
      what_success_looks_like:
        question: "Se UMA pessoa mudar de ideia por causa dessa página, já valeu? O que é \"deu certo\" pra você?"
        answer: "Meu sonho. Se uma pessoa olhar a página e pensar \"verdade né, essas bets, difícil\" já fez ela pensar só aqueles 5 segundinhos, sobre o tema e quem sabe até aprendeu alguma coisa (viciados em aprender liberados com limites e responsabilidade)"
      what_you_want_asked:
        question: "Qual pergunta você queria que te fizessem sobre isso, e ninguém faz?"
        answer: "Eu acho que todo mundo quer entender como faz site, aplicativo, a famosa entidade \"TI\" que se fosse só um guarda-chuva de profissões ia chover ao contrário (fez sentido o que eu visualizei na minha cabeça), ninguém vê a tela do dev durante os processos, mas essa é a parte mais legaaaallll, eu queria conseguir expor melhor o que é realmente o trabalho do dev - ainda mais hoje onde tudo é vibe coded (autocrítica)"

  sources:
    title: "Fontes"
    heading: "De onde vêm nossos números"
    intro: "Cada número no You-Bet tem por trás uma fonte pública verificada. Aqui está cada uma, o que fornece e como cruzamos os números."
    list_label: "Fontes de dados"
    provides_label: "O que mostra"
    figures_label: "Os números"
    conclusion_label: "O que isso quer dizer"
    source_link: "Ver a fonte ↗"
    data:
      bcb:
        provides: "Quanto dinheiro entra nas bets"
        figures:
          - "Em um mês de 2024, entre R$18 e R$21 bilhões foram apostados via Pix."
          - "Das famílias do Bolsa Família, as bets tiraram R$3 bilhões, atingindo 5 milhões de pessoas."
        conclusion: "Parte do dinheiro apostado vem de famílias de baixa renda."
        exact: "R$18–21 bi em transferências Pix num mês (2024); R$3 bi de 5 milhões de pessoas de famílias do Bolsa Família"
      datasenado:
        provides: "Quem aposta, quanto gasta, quanto deve"
        figures:
          - "Em 2024, 22,1 milhões de pessoas apostaram em um só mês."
          - "Mais da metade ganha até 2 salários mínimos."
          - "42% estão com contas atrasadas há mais de 90 dias."
        conclusion: "Grande parte de quem aposta tem baixa renda e já convive com dívidas."
        exact: "13% dos brasileiros de 16+ (22,13 milhões) apostaram em 30 dias; 52% ganham até 2 salários mínimos; 42% com dívida acima de 90 dias"
      cnc:
        provides: "Dívida das famílias"
        figures:
          - "O gasto mensal com bets cresceu mais de R$30 bilhões no período."
          - "Isso pode ter levado cerca de 270 mil famílias a dívidas graves."
        conclusion: "O gasto com apostas cresce junto com o endividamento das famílias."
        exact: "crescimento do gasto mensal superior a R$30 bilhões; cerca de 270 mil famílias em possível inadimplência severa"
      unifesp:
        provides: "Impacto na saúde"
        figures:
          - "Quase 11 milhões de pessoas (6,8% dos maiores de 14 anos) já apostam de um jeito que cria problemas de saúde e de dinheiro."
        conclusion: "Para milhões de pessoas, apostar já cria problemas de saúde e de dinheiro."
        exact: "10,9 milhões (6,8% dos maiores de 14 anos) jogam de forma a criar problemas para si"
      ibevar:
        provides: "O que mais endivida"
        figures:
          - "No estudo sobre endividamento, as apostas tiveram o maior peso, acima dos juros e do crédito."
        conclusion: "No estudo, as apostas pesaram mais no endividamento do que os juros."
        exact: "coeficientes no endividamento: apostas 0,2255; juros ao consumidor 0,0709; crédito sobre a renda 0,0440"
      inss:
        provides: "Auxílios por vício em apostas"
        figures:
          - "Os auxílios do INSS por vício em apostas cresceram mais de 2.300% entre junho de 2023 e abril de 2025."
          - "73% de quem recebe são homens."
        conclusion: "O vício em apostas já aparece nos pedidos de auxílio ao INSS."
        exact: "+2.300% em auxílios por ludopatia (jun/2023 a abr/2025); 73% dos beneficiários são homens"
      atlasintel:
        provides: "Opinião dos brasileiros"
        figures:
          - "Quase 87% das pessoas acham as bets prejudiciais."
          - "70% querem proibir de vez."
        conclusion: "A maioria dos brasileiros considera as bets prejudiciais e quer mais regras."
        exact: "86,7% acham prejudicial; 70% por proibição total; 76% por limites de publicidade; 85,2% associam ao endividamento familiar"
    methodology_heading: "Como conferimos os números"
    cited_label: "Fontes:"
    notes:
      bettor_count:
        subject: "Contagem de apostadores: BCB vs DataSenado"
        body: "O BCB conta CPFs distintos enviando Pix para bets; o DataSenado pesquisa apostadores autodeclarados (22,1 mi/mês). Os métodos diferem — citamos cada número à sua própria fonte em vez de fundi-los."
      cnc_contested:
        subject: "A magnitude da CNC é contestada"
        body: "O estudo da CNC recebeu uma réplica pública da associação da indústria de apostas (IBJR), que contesta a escala. Citamos a CNC, mas sinalizamos a disputa em vez de apresentá-la como consenso."
      bolsa_familia:
        subject: "O que é o Bolsa Família"
        body: "O Bolsa Família é o programa federal de transferência de renda do Brasil para famílias de baixa renda."

  devlog:
    title: "Diário"
    heading: "Construindo isto abertamente"
    intro: "Um registro diário de como o You-Bet foi feito — uma entrada por dia de sprint, da mais recente para a mais antiga."
    ai_note: "A Betina — minha assistente de IA — escreveu estas entradas. Não são totalmente revisadas, mas ajudam a contar como isto foi construído."

  privacy:
    title: "Privacidade"
    heading: "O que guardamos e como apagar"
    intro: "O You-Bet nunca pede seu nome, seu email ou uma senha. Guardamos bem pouca coisa, e você pode apagar tudo quando quiser. É o que a LGPD garante. Abaixo a gente explica, em português claro, o que fica salvo e por quê."
    collected_label: "Dados que registramos"
    purpose_label: "Por quê"
    retention_label: "Por quanto tempo"
    collected:
      visitor_cookie:
        name: "Um cookie que identifica a sua visita"
        purpose: "Cookie é um pequeno arquivo de texto que o site salva no seu navegador. O nosso não tem o seu nome: guarda só um número aleatório, que serve para o site reconhecer que é você quando você volta e trazer a sua simulação de volta pra você."
        retention: "Fica salvo no seu navegador até você limpá-lo."
      simulation_inputs:
        name: "Os dados que você digita na simulação"
        purpose: "Os tipos de aposta, o valor por semana e o prazo que você escolhe. A gente usa isso só para calcular a sua projeção."
        retention: "Ficam salvos junto com aquele número do cookie até você limpar o cookie. O resultado do cálculo em si é anônimo e não fica ligado a você."
      language_preference:
        name: "Preferência de idioma"
        purpose: "O idioma que você escolhe, para o site falar a sua língua."
        retention: "Fica no cookie da sua sessão e é apagada quando você fecha o navegador."
    deletion:
      heading: "Como apagar seus dados"
      intro: "Como aquele número do cookie vive só no seu navegador, o controle é todo seu:"
      step_clear_cookie: "Limpe os cookies e os dados deste site nas configurações do seu navegador. Isso apaga o seu número de visitante e desfaz o vínculo com qualquer simulação salva para ele."
      step_no_profile: "A gente nunca guarda nome, email ou perfil do seu aparelho. Então, depois que o cookie some, o que sobra não tem como ser ligado a você."
      contact_html: "Quer fazer um pedido formal de exclusão pela LGPD? Fale com quem mantém o projeto pelo %{repo_link}."
      contact_repo_label: "repositório público de código"
    references:
      heading: "Para saber mais"
      lgpd: "LGPD — Lei nº 13.709/2018 (texto oficial)"
      anpd_cookies: "ANPD — Guia sobre cookies e proteção de dados pessoais"

