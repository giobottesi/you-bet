pt-BR:
  activerecord:
    models:
      app_config: "Configuração"
    attributes:
      app_config:
        key: "Chave"
        value: "Valor"
        value_type: "Tipo de Valor"
    errors:
      models:
        app_config:
          attributes:
            key:
              taken: "já está em uso"
            value_type:
              inclusion: "não é um tipo de valor válido"
  app_name: "You Bet"
  tagline: "A matemática que as casas de apostas não mostram"

  content:
    back_to_simulator: "Voltar ao simulador"

  sources:
    title: "Fontes"
    heading: "De onde vêm nossos números"
    intro: "Cada número no You-Bet tem por trás uma fonte pública verificada. Aqui está cada uma, o que fornece e como cruzamos os números."
    list_label: "Fontes de dados"
    provides_label: "O que mostra"
    figures_label: "Os números"
    conclusion_label: "O que isso quer dizer"
    source_link: "Ver a fonte ↗"
    data:
      bcb:
        provides: "Quanto dinheiro entra nas bets"
        figures:
          - "Em um mês de 2024, entre R$18 e R$21 bilhões foram apostados via Pix."
          - "Das famílias do Bolsa Família, as bets tiraram R$3 bilhões, atingindo 5 milhões de pessoas."
        conclusion: "Parte do dinheiro apostado vem de famílias de baixa renda."
        exact: "R$18–21 bi em transferências Pix num mês (2024); R$3 bi de 5 milhões de pessoas de famílias do Bolsa Família"
      datasenado:
        provides: "Quem aposta, quanto gasta, quanto deve"
        figures:
          - "Em 2024, 22,1 milhões de pessoas apostaram em um só mês."
          - "Mais da metade ganha até 2 salários mínimos."
          - "42% estão com contas atrasadas há mais de 90 dias."
        conclusion: "Grande parte de quem aposta tem baixa renda e já convive com dívidas."
        exact: "13% dos brasileiros de 16+ (22,13 milhões) apostaram em 30 dias; 52% ganham até 2 salários mínimos; 42% com dívida acima de 90 dias"
      cnc:
        provides: "Dívida das famílias"
        figures:
          - "O gasto mensal com bets cresceu mais de R$30 bilhões no período."
          - "Isso pode ter levado cerca de 270 mil famílias a dívidas graves."
        conclusion: "O gasto com apostas cresce junto com o endividamento das famílias."
        exact: "crescimento do gasto mensal superior a R$30 bilhões; cerca de 270 mil famílias em possível inadimplência severa"
      unifesp:
        provides: "Impacto na saúde"
        figures:
          - "Quase 11 milhões de pessoas (6,8% dos maiores de 14 anos) já apostam de um jeito que cria problemas de saúde e de dinheiro."
        conclusion: "Para milhões de pessoas, apostar já cria problemas de saúde e de dinheiro."
        exact: "10,9 milhões (6,8% dos maiores de 14 anos) jogam de forma a criar problemas para si"
      ibevar:
        provides: "O que mais endivida"
        figures:
          - "No estudo sobre endividamento, as apostas tiveram o maior peso, acima dos juros e do crédito."
        conclusion: "No estudo, as apostas pesaram mais no endividamento do que os juros."
        exact: "coeficientes no endividamento: apostas 0,2255; juros ao consumidor 0,0709; crédito sobre a renda 0,0440"
      inss:
        provides: "Auxílios por vício em apostas"
        figures:
          - "Os auxílios do INSS por vício em apostas cresceram mais de 2.300% entre junho de 2023 e abril de 2025."
          - "73% de quem recebe são homens."
        conclusion: "O vício em apostas já aparece nos pedidos de auxílio ao INSS."
        exact: "+2.300% em auxílios por ludopatia (jun/2023 a abr/2025); 73% dos beneficiários são homens"
      atlasintel:
        provides: "Opinião dos brasileiros"
        figures:
          - "Quase 87% das pessoas acham as bets prejudiciais."
          - "70% querem proibir de vez."
        conclusion: "A maioria dos brasileiros considera as bets prejudiciais e quer mais regras."
        exact: "86,7% acham prejudicial; 70% por proibição total; 76% por limites de publicidade; 85,2% associam ao endividamento familiar"
    methodology_heading: "Como conferimos os números"
    cited_label: "Fontes:"
    notes:
      bettor_count:
        subject: "Contagem de apostadores: BCB vs DataSenado"
        body: "O BCB conta CPFs distintos enviando Pix para bets; o DataSenado pesquisa apostadores autodeclarados (22,1 mi/mês). Os métodos diferem — citamos cada número à sua própria fonte em vez de fundi-los."
      cnc_contested:
        subject: "A magnitude da CNC é contestada"
        body: "O estudo da CNC recebeu uma réplica pública da associação da indústria de apostas (IBJR), que contesta a escala. Citamos a CNC, mas sinalizamos a disputa em vez de apresentá-la como consenso."
      bolsa_familia:
        subject: "O que é o Bolsa Família"
        body: "O Bolsa Família é o programa federal de transferência de renda do Brasil para famílias de baixa renda."

  devlog:
    title: "Diário"
    heading: "Construindo isto abertamente"
    intro: "Um registro diário de como o You-Bet foi feito — uma entrada por dia de sprint, da mais recente para a mais antiga."
    ai_note: "A Betina — minha assistente de IA — escreveu estas entradas. Não são totalmente revisadas, mas ajudam a contar como isto foi construído."

  privacy:
    title: "Privacidade"
    heading: "O que guardamos e como apagar"
    intro: "O You-Bet nunca pede seu nome, seu email ou uma senha. Guardamos bem pouca coisa, e você pode apagar tudo quando quiser. É o que a LGPD garante. Abaixo a gente explica, em português claro, o que fica salvo e por quê."
    collected_label: "Dados que registramos"
    purpose_label: "Por quê"
    retention_label: "Por quanto tempo"
    collected:
      visitor_cookie:
        name: "Um cookie que identifica a sua visita"
        purpose: "Cookie é um pequeno arquivo de texto que o site salva no seu navegador. O nosso não tem o seu nome: guarda só um número aleatório, que serve para o site reconhecer que é você quando você volta e trazer a sua simulação de volta pra você."
        retention: "Fica salvo no seu navegador até você limpá-lo."
      simulation_inputs:
        name: "Os dados que você digita na simulação"
        purpose: "Os tipos de aposta, o valor por semana e o prazo que você escolhe. A gente usa isso só para calcular a sua projeção."
        retention: "Ficam salvos junto com aquele número do cookie até você limpar o cookie. O resultado do cálculo em si é anônimo e não fica ligado a você."
      language_preference:
        name: "Preferência de idioma"
        purpose: "O idioma que você escolhe, para o site falar a sua língua."
        retention: "Fica no cookie da sua sessão e é apagada quando você fecha o navegador."
    deletion:
      heading: "Como apagar seus dados"
      intro: "Como aquele número do cookie vive só no seu navegador, o controle é todo seu:"
      step_clear_cookie: "Limpe os cookies e os dados deste site nas configurações do seu navegador. Isso apaga o seu número de visitante e desfaz o vínculo com qualquer simulação salva para ele."
      step_no_profile: "A gente nunca guarda nome, email ou perfil do seu aparelho. Então, depois que o cookie some, o que sobra não tem como ser ligado a você."
      contact_html: "Quer fazer um pedido formal de exclusão pela LGPD? Fale com quem mantém o projeto pelo %{repo_link}."
      contact_repo_label: "repositório público de código"
    references:
      heading: "Para saber mais"
      lgpd: "LGPD — Lei nº 13.709/2018 (texto oficial)"
      anpd_cookies: "ANPD — Guia sobre cookies e proteção de dados pessoais"

