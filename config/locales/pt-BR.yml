  content:
    back_to_simulator: "Voltar ao simulador"

  sources:
    title: "Fontes"
    heading: "De onde vêm nossos números"
    intro: "Cada número no You-Bet tem por trás uma fonte pública verificada. Aqui está cada uma, o que fornece e como a conciliamos."
    list_label: "Fontes de dados"
    provides_label: "O que fornece"
    figures_label: "Números principais"
    source_link: "Ver a fonte ↗"
    methodology_heading: "Notas metodológicas"
    learn_more: "Saiba mais ↗"
    notes:
      bettor_count:
        subject: "Contagem de apostadores: BCB vs DataSenado"
        body: "O BCB conta CPFs distintos enviando Pix para bets; o DataSenado pesquisa apostadores autodeclarados (22,1 mi/mês). Os métodos diferem — citamos cada número à sua própria fonte em vez de fundi-los."
      cnc_contested:
        subject: "A magnitude da CNC é contestada"
        body: "O estudo da CNC recebeu uma réplica pública da associação da indústria de apostas (IBJR), que contesta a escala. Citamos a CNC, mas sinalizamos a disputa em vez de apresentá-la como consenso."
      tigrinho_edge:
        subject: "Margem da casa no tigrinho"
        body: "A PG Soft alega RTP de 96,81%, mas plataformas não reguladas podem definir RTPs menores. Usamos 5% como meio-termo conservador e declaramos isso de forma transparente."
      bolsa_familia:
        subject: "O que é o Bolsa Família"
        body: "O Bolsa Família é o programa federal de transferência de renda do Brasil para famílias de baixa renda."

  devlog:
    title: "Diário"
    heading: "Construindo isto abertamente"
    intro: "Um registro diário de como o You-Bet foi feito — uma entrada por dia de sprint, da mais recente para a mais antiga."
    ai_note: "A Betina — minha assistente de IA — escreveu estas entradas. Não são totalmente revisadas, mas ajudam a contar como isto foi construído."

  privacy:
    title: "Privacidade"
    heading: "O que guardamos e como apagar"
    intro: "O You-Bet nunca pede seu nome, email ou login. Aqui está o pouco que guardamos, por que guardamos e como apagar quando quiser — exatamente como a LGPD garante."
    collected_label: "Dados que registramos"
    purpose_label: "Por quê"
    retention_label: "Por quanto tempo"
    collected:
      visitor_cookie:
        name: "Cookie de identificação do visitante"
        purpose: "Uma etiqueta aleatória que o seu navegador carrega para diferenciarmos uma visita anônima de outra — é assim que a sua simulação volta pra você, sem nenhum nome atrelado."
        retention: "Guardada como cookie no seu navegador até você limpá-lo. Só isso."
      simulation_inputs:
        name: "Os dados da sua simulação"
        purpose: "Os tipos de aposta, o valor semanal e o prazo que você informa — usamos só para rodar a sua projeção."
        retention: "Guardados junto à sua etiqueta de visitante para que as suas rodadas continuem suas, até você limpar o cookie. O resultado em si fica em um cache anônimo compartilhado, não ligado a você."
      language_preference:
        name: "Preferência de idioma"
        purpose: "O idioma que você escolhe, para o site falar a sua língua."
        retention: "Vai junto no cookie de sessão e é descartada quando a sessão termina."
    deletion:
      heading: "Como apagar seus dados"
      intro: "Como a sua etiqueta de visitante vive apenas no seu navegador, o controle é seu:"
      step_clear_cookie: "Limpe os cookies e os dados deste site nas configurações do navegador. Isso apaga a sua etiqueta de visitante e corta o vínculo com qualquer simulação guardada para ela."
      step_no_profile: "Nunca guardamos nome, email ou perfil de dispositivo — então, uma vez apagado o cookie, o que sobrar não pode ser rastreado até você."
      contact: "Quer um pedido formal de exclusão sob a LGPD? Fale com os mantenedores pelo repositório público de código do projeto."

