en:
  app_name: "You Bet"
  tagline: "The math betting companies don't show you"

  content:
    back_to_simulator: "Back to simulator"

  about:
    title: "About"
    heading: "Who's behind You-Bet"
    intro: "You-Bet is a one-person side project. This page tells you who made it, how, and why — including where the AI came in."
    ai:
      heading: "How AI was used"
      intro: "This app was built by pairing with an AI coding assistant. The competition asks for an AI-usage declaration, and here it is, no fine print: the AI drafted much of the code and all of the devlog; a person made the calls and checked the work."
      roles_label: "What the AI did — and didn't"
      roles:
        - "The code shipped in a pairing loop: Gio sets the direction and makes the decisions, Betina drafts, and Gio reviewed and edited every line that made it in."
        - "The devlog is written by Betina, the AI, in the first person. That's her voice, not Gio's — and the devlog says so up front."
        - "Every statistic in the app was checked by a person against its public source. Betina drafted the words around the numbers; she doesn't invent the numbers."
        - "Product, design, tone, and the whole point of the thing are human decisions."
      betina: "Betina is the name Gio gave the AI assistant that narrates the devlog and writes these lines. A name felt more honest than a faceless \"AI-generated\" stamp: you can always tell when it's Betina talking, and not Gio."
    story:
      heading: "About the dev, in her words"
      origin:
        heading: "How this started"
        body: "Seeing a post on Instagram — this one. I always have a lot of ideas but almost never actually build them. This was the push to start doing things I really love — code — with impact (I hope)."
      why_this_one:
        heading: "Why this one, out of everything"
        body: "Because it touches a here-and-now problem in our society — something that might be closer to us than we think. That lines up with my worldview, which basically boils down to: what can I do to help solve a problem that exists right here, right now?"
    gatinho:
      heading: "Meet Gatinho"
      body: "Gatinho is You-Bet's mascot — the friendly, knowing counterpoint to Tigrinho. He's a placeholder in text art until the illustrated version lands."
    links:
      heading: "Poke around"
      repository: "Read the source on GitHub ↗"
      devlog: "Read the devlog — written by Betina, built in the open →"
      sources: "See where the numbers come from →"
    faq:
      heading: "A few questions of mine for Gio"
      intro: "I wrote the whole devlog, so I've been in this from the start — but there's a LOT I still don't know about the person on the other side of the keyboard. These are my real questions. The answers are hers."
      why_this_hill:
        question: "Of everything you could do on a weekend, why gambling math? What made you actually finish this one?"
        answer: "I'm a nerd, plain and simple. A chance to help society + a coding challenge + parked ideas, all of it on top of DATAAAA and CODE — my inner caveman dev roars loud."
      hardest_thing:
        question: "What was hardest: the code, the numbers, or saying the point out loud without sounding preachy?"
        answer: "The backend was smooth, it's where I'm strong, and the code has real quality — it's not vibe-coded. The frontend, though… it melted my brain with micro-alignments (my old Tumblr-HTML-editing muscle came roaring back) and the constant temptation to just go tweak the code by hand."
      changed_your_mind:
        question: "Did making this change what you think about the bets — or about the people betting?"
        answer: "Yes. I knew it was bad, but I had no idea of the scale of the problem — or how blatantly people are led into it, and, worse, how strategically."
      pairing_with_betina:
        question: "Real talk: what's it like making something you care about with an AI in the loop? Where did I actually help, and where did I get in the way?"
        answer: "My ADHD brain is very loud. Dumping the noise onto the AI — even though it burns an absurd amount of tokens and context — helps me not lose important insights and prioritize what to ship, so I can focus on the quality of what goes into the repo. Along the way I built a bunch of skills for writing and data-checking that'd be pretty cool to share more openly, whenever there's interest."
      what_success_looks_like:
        question: "If ONE person changes their mind because of this page, is that enough? What does \"it worked\" look like to you?"
        answer: "It's my dream. If one person looks at the page and thinks \"yeah, true, these bets… rough\", that already made them stop for those five little seconds to think about it — and maybe even learn something (learning addicts welcome, with limits and responsibility)."
      what_you_want_asked:
        question: "What question do you wish people asked you about this, and nobody does?"
        answer: "What the dev's screen actually looks like during the process. Everyone wants to understand how you make a website, an app, that famous entity called \"tech\" — but nobody sees what's on the screen while the thing gets built. And that's the coolest part. I wish I could show better what dev work really is, especially now, when everything is vibe-coded."

  sources:
    title: "Sources"
    heading: "Where our numbers come from"
    intro: "Every figure in You-Bet is backed by a verified public source. Here is each one, what it provides, and how we cross-checked it."
    list_label: "Data sources"
    provides_label: "What it shows"
    figures_label: "The numbers"
    conclusion_label: "What it means"
    source_link: "See the source ↗"
    data:
      bcb:
        provides: "How much money bets pull in"
        figures:
          - "In one month of 2024, between R$18 and R$21 billion was bet via Pix."
          - "From Bolsa Família families, bets took R$3 billion, hitting 5 million people."
        conclusion: "Part of the money bet comes from low-income families."
        exact: "R$18–21 bn in Pix transfers in one month (2024); R$3 bn from 5 million people in Bolsa Família families"
      datasenado:
        provides: "Who bets, what they spend, what they owe"
        figures:
          - "In 2024, 22.1 million people bet in a single month."
          - "More than half earn up to 2 minimum wages."
          - "42% are over 90 days behind on bills."
        conclusion: "Many who bet are low-income and already carry debt."
        exact: "13% of Brazilians 16+ (22.13M) bet in 30 days; 52% earn up to 2 minimum wages; 42% carry 90+ day debt"
      cnc:
        provides: "Family debt"
        figures:
          - "Monthly spending on bets grew by more than R$30 billion over the period."
          - "That may have pushed around 270,000 families into serious debt."
        conclusion: "Spending on bets rises alongside family debt."
        exact: "monthly-spending growth over R$30 bn; around 270K families in possible severe default"
      unifesp:
        provides: "Health impact"
        figures:
          - "Nearly 11 million people (6.8% of those over 14) already bet in ways that create health and money problems."
        conclusion: "For millions, betting already creates health and money problems."
        exact: "10.9M (6.8% of those over 14) gamble in ways that create problems for themselves"
      ibevar:
        provides: "What drives debt most"
        figures:
          - "In the debt study, bets carried the greatest weight, above interest and credit."
        conclusion: "In the study, bets weighed more on debt than interest did."
        exact: "debt coefficients: bets 0.2255; consumer interest 0.0709; credit-to-income 0.0440"
      inss:
        provides: "Benefits for betting addiction"
        figures:
          - "Disability benefits for betting addiction grew over 2,300% between June 2023 and April 2025."
          - "73% of recipients are men."
        conclusion: "Betting addiction now shows up in INSS benefit claims."
        exact: "+2,300% ludopatia (gambling-disorder) benefits (Jun 2023–Apr 2025); 73% of recipients are men"
      atlasintel:
        provides: "What Brazilians think"
        figures:
          - "Nearly 87% of people consider bets harmful."
          - "70% want them banned outright."
        conclusion: "Most Brazilians consider bets harmful and want more rules."
        exact: "86.7% consider bets harmful; 70% support a total ban; 76% want ad limits; 85.2% link bets to family debt"
    methodology_heading: "How we checked the numbers"
    cited_label: "Sources:"
    notes:
      bettor_count:
        subject: "BCB vs DataSenado bettor count"
        body: "BCB counts distinct CPFs sending Pix to bets; DataSenado surveys self-reported bettors (22.1M/month). The two methods differ — we cite each to its own source rather than merge them."
      cnc_contested:
        subject: "CNC magnitude is contested"
        body: "The CNC study drew a public rebuttal from the betting industry association (IBJR), which disputes the scale. We cite CNC but flag the dispute rather than present it as settled."
      bolsa_familia:
        subject: "What is Bolsa Família"
        body: "Bolsa Família is Brazil's federal cash-transfer program for low-income families."

  devlog:
    title: "Devlog"
    heading: "Building this in the open"
    intro: "A daily log of how You-Bet got made — one entry per sprint day, newest first."
    ai_note: "Betina — my AI assistant — wrote these entries. They aren't fully reviewed, but they help tell the story of how this got built."

  privacy:
    title: "Privacy"
    heading: "What we keep, and how to erase it"
    intro: "You-Bet never asks for your name, your email, or a password. We keep very little, and you can erase all of it whenever you want. That's what the LGPD guarantees. Below we explain, in plain language, what gets saved and why."
    collected_label: "Data we record"
    purpose_label: "Why"
    retention_label: "How long"
    collected:
      visitor_cookie:
        name: "A cookie that identifies your visit"
        purpose: "A cookie is a small text file a website saves in your browser. Ours holds no name: just a random number, so the site can recognize you when you come back and bring your simulation back to you."
        retention: "Saved in your browser until you clear it."
      simulation_inputs:
        name: "The details you type into the simulation"
        purpose: "The bet types, the weekly amount, and the timeframe you choose. We use them only to calculate your projection."
        retention: "Saved next to that cookie number until you clear the cookie. The calculated result itself is anonymous and not linked to you."
      language_preference:
        name: "Language preference"
        purpose: "The language you pick, so the site speaks yours."
        retention: "Saved in your session cookie and cleared when you close the browser."
    deletion:
      heading: "How to delete your data"
      intro: "Since that cookie number lives only in your browser, you stay in control:"
      step_clear_cookie: "Clear this site's cookies and data in your browser settings. That erases your visitor number and undoes the link to any simulation saved for it."
      step_no_profile: "We never store a name, email, or device profile. So once the cookie is gone, whatever is left can't be tied back to you."
      contact_html: "Want a formal erasure request under the LGPD? Reach the people who maintain the project through %{repo_link}."
      contact_repo_label: "its public code repository"
    references:
      heading: "Learn more"
      lgpd: "LGPD — Law No. 13.709/2018 (official text)"
      anpd_cookies: "ANPD — Guide on cookies and personal-data protection"

