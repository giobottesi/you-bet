en:
  app_name: "You Bet"
  tagline: "The math betting companies don't show you"

  content:
    back_to_simulator: "Back to simulator"

  sources:
    title: "Sources"
    heading: "Where our numbers come from"
    intro: "Every figure in You-Bet is backed by a verified public source. Here is each one, what it provides, and how we reconciled it."
    list_label: "Data sources"
    provides_label: "What it provides"
    figures_label: "Key figures"
    source_link: "See the source ↗"
    methodology_heading: "Methodological notes"
    learn_more: "Learn more ↗"
    notes:
      bettor_count:
        subject: "BCB vs DataSenado bettor count"
        body: "BCB counts distinct CPFs sending Pix to bets; DataSenado surveys self-reported bettors (22.1M/month). The two methods differ — we cite each to its own source rather than merge them."
      cnc_contested:
        subject: "CNC magnitude is contested"
        body: "The CNC study drew a public rebuttal from the betting industry association (IBJR), which disputes the scale. We cite CNC but flag the dispute rather than present it as settled."
      tigrinho_edge:
        subject: "Tigrinho house edge"
        body: "PG Soft claims 96.81% RTP, but unregulated platforms can set lower RTPs. We use 5% as a conservative middle ground and disclose it transparently."
      bolsa_familia:
        subject: "What is Bolsa Família"
        body: "Bolsa Família is Brazil's federal cash-transfer program for low-income families."

  devlog:
    title: "Devlog"
    heading: "Building this in the open"
    intro: "A daily log of how You-Bet got made — one entry per sprint day, newest first."
    ai_note: "Betina — my AI assistant — wrote these entries. They aren't fully reviewed, but they help tell the story of how this got built."

  privacy:
    title: "Privacy"
    heading: "What we keep, and how to erase it"
    intro: "You-Bet never asks for your name, your email, or a password. We keep very little, and you can erase all of it whenever you want. That's what the LGPD guarantees. Below we explain, in plain language, what gets saved and why."
    collected_label: "Data we record"
    purpose_label: "Why"
    retention_label: "How long"
    collected:
      visitor_cookie:
        name: "A cookie that identifies your visit"
        purpose: "A cookie is a small text file a website saves in your browser. Ours holds no name: just a random number, so the site can recognize you when you come back and bring your simulation back to you."
        retention: "Saved in your browser until you clear it."
      simulation_inputs:
        name: "The details you type into the simulation"
        purpose: "The bet types, the weekly amount, and the timeframe you choose. We use them only to calculate your projection."
        retention: "Saved next to that cookie number until you clear the cookie. The calculated result itself is anonymous and not linked to you."
      language_preference:
        name: "Language preference"
        purpose: "The language you pick, so the site speaks yours."
        retention: "Saved in your session cookie and cleared when you close the browser."
    deletion:
      heading: "How to delete your data"
      intro: "Since that cookie number lives only in your browser, you stay in control:"
      step_clear_cookie: "Clear this site's cookies and data in your browser settings. That erases your visitor number and undoes the link to any simulation saved for it."
      step_no_profile: "We never store a name, email, or device profile. So once the cookie is gone, whatever is left can't be tied back to you."
      contact_html: "Want a formal erasure request under the LGPD? Reach the people who maintain the project through %{repo_link}."
      contact_repo_label: "its public code repository"
    references:
      heading: "Learn more"
      lgpd: "LGPD — Law No. 13.709/2018 (official text)"
      anpd_cookies: "ANPD — Guide on cookies and personal-data protection"

