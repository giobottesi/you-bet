default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "you_bet") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "you_bet") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>

development:
  <<: *default
  database: you_bet_development

test:
  <<: *default
  database: you_bet_test

staging:
  <<: *default
  database: you_bet_staging

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: you_bet_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: you_bet_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: you_bet_production_cable
    migrations_paths: db/cable_migrate
